name: Validate Metadata

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'verification/**'
      - 'benchmarks/**'
      - 'assets/**'
      - 'examples/**'
  push:
    branches: [master, feat/*]
    paths:
      - 'docs/**'
      - 'verification/**'
      - 'benchmarks/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install pyyaml

      - name: 验证 Frontmatter
        run: python3 scripts/validate_metadata.py --ci

      - name: 验证证据等级
        run: python3 scripts/validate_metadata.py --check-evidence-level

  validate-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 检查内部链接
        run: python3 scripts/check_links.py --ci
