name: Build Knowledge Graph

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'verification/**'
      - 'scripts/build_graph.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 构建 Graph Data
        run: python3 scripts/build_graph.py --output visualization/graph-data.json

      - name: 验证 Graph Data
        run: |
          python3 -c "
          import json
          with open('visualization/graph-data.json') as f:
              data = json.load(f)
          assert 'nodes' in data, 'Missing nodes'
          assert 'links' in data, 'Missing links'
          print(f'Graph: {len(data[\"nodes\"])} nodes, {len(data[\"links\"])} links')
          "

      - name: 提交更新 [skip ci]
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add visualization/graph-data.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "Graph data 无变化"
          else
            git commit -m "chore: 更新 knowledge graph data [skip ci]"
            git push
          fi
